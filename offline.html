<!-- offline.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - HealthCare App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f7fa;
      text-align: center;
    }
    .offline-container {
      padding: 2rem;
    }
    h1 { color: #2c7be5; }
    button {
      padding: 1rem 2rem;
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <h1>📡 You're Offline</h1>
    <p>Some features may be limited. Your appointments are still accessible.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
